<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding-top: 20px; }
    .container { max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .hidden { display: none; }
    #loader { display: none; }
    .btn-lg { height: 60px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h3 class="text-center mb-4">Sistema de Marcaciones</h3>

  <div id="loginSection">
    <div class="mb-3">
      <label class="form-label">Cédula de Identidad</label>
      <input type="number" id="cedulaInput" class="form-control form-control-lg" placeholder="Ej: 1234567">
    </div>
    <button onclick="login()" class="btn btn-primary w-100 btn-lg">Ingresar</button>
  </div>

  <div id="formSection" class="hidden">
    <div class="alert alert-info py-2">Hola, <b id="userNameDisplay"></b></div>
    
    <div class="mb-3">
      <label class="form-label">Punto de Venta</label>
      <select id="pdvSelect" class="form-select form-select-lg"></select>
    </div>

    <div class="row g-2">
      <div class="col-6">
        <button onclick="procesar('ENTRADA')" class="btn btn-success w-100 btn-lg">ENTRADA</button>
      </div>
      <div class="col-6">
        <button onclick="procesar('SALIDA')" class="btn btn-danger w-100 btn-lg">SALIDA</button>
      </div>
    </div>
  </div>

  <div id="loader" class="text-center mt-3">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Procesando ubicación...</p>
  </div>
  <div id="msg" class="mt-3 text-center fw-bold"></div>
</div>

<script>
  let DB = {};
  let usuarioActivo = null;

  // Carga inicial de datos
  window.onload = () => {
    google.script.run.withSuccessHandler(data => {
      DB = data;
      const select = document.getElementById('pdvSelect');
      data.pdvs.forEach((pdv, index) => {
        let opt = document.createElement('option');
        opt.value = index;
        opt.innerHTML = pdv.nombre;
        select.appendChild(opt);
      });
    }).getInitialData();
  };

  function login() {
    const input = document.getElementById('cedulaInput').value;
    usuarioActivo = DB.relevadores.find(r => r.cedula === input);
    
    if (usuarioActivo) {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('formSection').classList.remove('hidden');
      document.getElementById('userNameDisplay').innerText = usuarioActivo.nombre;
    } else {
      alert("Cédula no encontrada");
    }
  }

  function procesar(tipo) {
    const msgDiv = document.getElementById('msg');
    const loader = document.getElementById('loader');
    msgDiv.innerText = "";
    loader.style.display = "block";

    if (!navigator.geolocation) {
      alert("Tu navegador no soporta geolocalización");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const pdvIndex = document.getElementById('pdvSelect').value;
        const pdv = DB.pdvs[pdvIndex];

        const payload = {
          tipo: tipo,
          cedula: usuarioActivo.cedula,
          relevadorNombre: usuarioActivo.nombre,
          pdvNombre: pdv.nombre,
          pdvLat: pdv.lat,
          pdvLng: pdv.lng,
          userLat: pos.coords.latitude,
          userLng: pos.coords.longitude
        };

        google.script.run
          .withSuccessHandler(res => {
            loader.style.display = "none";
            const color = res.validacion === "VALIDO" ? "green" : "red";
            msgDiv.style.color = color;
            msgDiv.innerHTML = `Marcación: ${res.status.toUpperCase()}<br>
                                Distancia: ${res.distancia} metros<br>
                                Estado: ${res.validacion}`;
          })
          .withFailureHandler(err => {
            loader.style.display = "none";
            alert(err.message);
          })
          .registrarMarcacion(payload);
      },
      (err) => {
        loader.style.display = "none";
        alert("Error al obtener ubicación. Por favor activa el GPS.");
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }
</script>

</body>
</html>
