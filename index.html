<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Profesional | +Marka Control</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  
  <style>
    :root {
      --primary: #004a99;
      --secondary: #ffc107;
      --bg-color: #f0f2f5;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container { max-width: 1200px; margin: auto; }

    /* Encabezado */
    .header {
      background: var(--primary);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--card-shadow);
    }

    .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }

    /* Tarjetas KPI */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .kpi-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: var(--card-shadow);
      border-bottom: 5px solid var(--secondary);
    }

    .kpi-card span { font-size: 14px; color: #777; text-transform: uppercase; font-weight: 500; }
    .kpi-card h2 { margin: 10px 0 0; font-size: 32px; color: var(--primary); }

    /* Filtros */
    .filter-bar {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: var(--card-shadow);
    }

    .filter-bar select, .filter-bar input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      flex: 1;
      min-width: 150px;
    }

    /* Gráficos */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 20px;
    }

    .chart-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      min-height: 400px;
    }

    .chart-box h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: var(--primary); }

    /* Loader */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9);
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
    }

    @media (max-width: 600px) {
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <div style="border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
    <p>Conectando con base de datos...</p>
  </div>

  <div class="container">
    <div class="header">
      <h1>📊 Dashboard de Supervisión +Marka</h1>
      <button onclick="fetchData()" style="background: var(--secondary); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">Actualizar Datos</button>
    </div>

    <div class="filter-bar">
      <select id="selSupervisor" onchange="applyFilters()">
        <option value="ALL">Todos los Supervisores</option>
      </select>
      <select id="selFormulario" onchange="applyFilters()">
        <option value="ALL">Todos los Formularios</option>
      </select>
      <input type="date" id="dateDesde" onchange="applyFilters()" placeholder="Desde">
      <input type="date" id="dateHasta" onchange="applyFilters()" placeholder="Hasta">
    </div>

    <div class="kpi-grid">
      <div class="kpi-card"><span>Total Visitas</span><h2 id="kpiVisitas">0</h2></div>
      <div class="kpi-card"><span>Supervisores</span><h2 id="kpiSups">0</h2></div>
      <div class="kpi-card"><span>PDVs Cubiertos</span><h2 id="kpiPdvs">0</h2></div>
    </div>

    <div class="charts-grid">
      <div class="chart-box"><h3>Visitas por Supervisor</h3><div id="chart_bar"></div></div>
      <div class="chart-box"><h3>Distribución por Formulario</h3><div id="chart_pie"></div></div>
      <div class="chart-box"><h3>Evolución de Visitas (Tiempo)</h3><div id="chart_line"></div></div>
      <div class="chart-box"><h3>Ranking de Puntos de Venta (Top 10)</h3><div id="chart_pdv"></div></div>
    </div>
  </div>

  <script>
    // CONFIGURACIÓN: REEMPLAZA CON TU URL SI ES NECESARIO
    const API_URL = "https://script.google.com/macros/s/AKfycbz-lrFyoxXaSEpYanB4WYxOVYVGoDjuXzvDioPxucszg033nwkJH8d0e5_vDzca8vSfEQ/exec";

    let RAW_DATA = [];
    google.charts.load('current', {'packages':['corechart', 'bar']});

    async function fetchData() {
      document.getElementById('loader').style.display = 'flex';
      try {
        const response = await fetch(API_URL);
        RAW_DATA = await response.json();
        
        setupFilters();
        applyFilters();
      } catch (e) {
        alert("Error al cargar datos. Verifica los permisos del Script de Google.");
      } finally {
        document.getElementById('loader').style.display = 'none';
      }
    }

    function setupFilters() {
      const sups = [...new Set(RAW_DATA.map(d => d.SUPERVISOR))].sort();
      const forms = [...new Set(RAW_DATA.map(d => d.FORMULARIO))].sort();
      
      const sSup = document.getElementById('selSupervisor');
      const sForm = document.getElementById('selFormulario');
      
      // Limpiar y llenar
      sSup.innerHTML = '<option value="ALL">Todos los Supervisores</option>';
      sForm.innerHTML = '<option value="ALL">Todos los Formularios</option>';
      
      sups.forEach(s => sSup.innerHTML += `<option value="${s}">${s}</option>`);
      forms.forEach(f => sForm.innerHTML += `<option value="${f}">${f}</option>`);
    }

    function applyFilters() {
      const fSup = document.getElementById('selSupervisor').value;
      const fForm = document.getElementById('selFormulario').value;
      const fDesde = document.getElementById('dateDesde').value;
      const fHasta = document.getElementById('dateHasta').value;

      const filtered = RAW_DATA.filter(row => {
        const matchSup = fSup === "ALL" || row.SUPERVISOR === fSup;
        const matchForm = fForm === "ALL" || row.FORMULARIO === fForm;
        
        let fechaRow = row.FECHA.split('T')[0];
        const matchDesde = !fDesde || fechaRow >= fDesde;
        const matchHasta = !fHasta || fechaRow <= fHasta;
        
        return matchSup && matchForm && matchDesde && matchHasta;
      });

      renderDashboard(filtered);
    }

    function renderDashboard(data) {
      // KPIs
      document.getElementById('kpiVisitas').innerText = data.length;
      document.getElementById('kpiSups').innerText = [...new Set(data.map(d => d.SUPERVISOR))].length;
      document.getElementById('kpiPdvs').innerText = [...new Set(data.map(d => d.PUNTO_DE_VENTA || d["PUNTO DE VENTA"]))].length;

      // 1. Gráfico de Barras: Supervisores
      let countSup = {};
      data.forEach(d => countSup[d.SUPERVISOR] = (countSup[d.SUPERVISOR] || 0) + 1);
      let dataBar = google.visualization.arrayToDataTable([
        ['Supervisor', 'Visitas', { role: 'style' }],
        ...Object.entries(countSup).map(([k, v]) => [k, v, '#004a99'])
      ]);
      new google.visualization.ColumnChart(document.getElementById('chart_bar')).draw(dataBar, { legend: 'none' });

      // 2. Gráfico de Torta: Formularios
      let countForm = {};
      data.forEach(d => countForm[d.FORMULARIO] = (countForm[d.FORMULARIO] || 0) + 1);
      let dataPie = google.visualization.arrayToDataTable([
        ['Formulario', 'Total'],
        ...Object.entries(countForm)
      ]);
      new google.visualization.PieChart(document.getElementById('chart_pie')).draw(dataPie, { pieHole: 0.4, colors: ['#004a99', '#ffc107', '#2ecc71', '#e74c3c'] });

      // 3. Gráfico de Línea: Tiempo
      let countFecha = {};
      data.forEach(d => {
        let f = d.FECHA.split('T')[0];
        countFecha[f] = (countFecha[f] || 0) + 1;
      });
      let sortedFechas = Object.entries(countFecha).sort((a,b) => a[0].localeCompare(b[0]));
      let dataLine = google.visualization.arrayToDataTable([['Fecha', 'Visitas'], ...sortedFechas]);
      new google.visualization.LineChart(document.getElementById('chart_line')).draw(dataLine, { colors: ['#ffc107'], legend: 'none' });

      // 4. Gráfico PDV Top 10
      let countPdv = {};
      data.forEach(d => {
        let p = d.PUNTO_DE_VENTA || d["PUNTO DE VENTA"];
        countPdv[p] = (countPdv[p] || 0) + 1;
      });
      let topPdv = Object.entries(countPdv).sort((a,b) => b[1]-a[1]).slice(0, 10);
      let dataPdv = google.visualization.arrayToDataTable([['PDV', 'Visitas'], ...topPdv]);
      new google.visualization.BarChart(document.getElementById('chart_pdv')).draw(dataPdv, { colors: ['#2ecc71'], legend: 'none' });
    }

    // Estilo para el loader (animación)
    const style = document.createElement('style');
    style.innerHTML = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
    document.head.appendChild(style);

    google.charts.setOnLoadCallback(fetchData);
  </script>
</body>
</html>
