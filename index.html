<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    :root {
      --primary: #004a99; --secondary: #ffc107; --bg: #f4f7fa;
      --card-bg: #ffffff; --text: #2d3436; --border: #dfe6e9;
    }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header h1 { margin: 0; font-size: 1.5rem; color: var(--primary); font-weight: 700; }

    /* KPI Cards */
    .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .kpi-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
    .kpi-card h3 { margin: 0; font-size: 0.8rem; color: #636e72; text-transform: uppercase; }
    .kpi-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 700; color: var(--primary); }

    /* Filtros */
    .filters { background: var(--card-bg); padding: 15px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; border: 1px solid var(--border); }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    select, input { padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: #fff; min-width: 180px; }

    /* Gráficos */
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .chart-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 350px; }
    .chart-card h4 { margin: 0 0 15px 0; font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

    /* Tabla */
    .table-container { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }

    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="loader"><b>Cargando Sistema...</b></div>

  <div class="header">
    <h1>DASHBOARD GESTIÓN DE CAMPO</h1>
    <button onclick="loadData()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer;">Actualizar</button>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Supervisor</label>
      <select id="filterSup" onchange="processData()"><option value="ALL">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Formulario</label>
      <select id="filterForm" onchange="processData()"><option value="ALL">Todos</option></select>
    </div>
    <div class="filter-group">
      <label>Desde</label>
      <input type="date" id="dateFrom" onchange="processData()">
    </div>
    <div class="filter-group">
      <label>Hasta</label>
      <input type="date" id="dateTo" onchange="processData()">
    </div>
  </div>

  <div class="kpi-container">
    <div class="kpi-card"><h3>Total Visitas</h3><p id="kpi-visitas">0</p></div>
    <div class="kpi-card"><h3>Formularios</h3><p id="kpi-forms">0</p></div>
    <div class="kpi-card"><h3>Supervisores</h3><p id="kpi-sups">0</p></div>
    <div class="kpi-card"><h3>Puntos Venta</h3><p id="kpi-pdv">0</p></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card"><h4>Visitas por Supervisor</h4><div id="chart_bar"></div></div>
    <div class="chart-card"><h4>Distribución de Formularios</h4><div id="chart_pie"></div></div>
    <div class="chart-card" style="grid-column: span 1;"><h4>Evolución Temporal</h4><div id="chart_line"></div></div>
    <div class="chart-card"><h4>Visitas por PDV (Top 10)</h4><div id="chart_pdv"></div></div>
  </div>

  <div class="table-container">
    <h4>Detalle de Operaciones</h4>
    <table id="mainTable">
      <thead>
        <tr><th>Fecha</th><th>Supervisor</th><th>Punto de Venta</th><th>Formulario</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    let RAW_DATA = [];
    google.charts.load('current', {'packages':['corechart', 'bar', 'line']});

    function loadData() {
      document.getElementById('loader').style.display = 'flex';
      google.script.run.withSuccessHandler(data => {
        RAW_DATA = data;
        populateFilters();
        processData();
        document.getElementById('loader').style.display = 'none';
      }).getDashboardData();
    }

    function populateFilters() {
      const sups = [...new Set(RAW_DATA.map(d => d.supervisor))];
      const forms = [...new Set(RAW_DATA.map(d => d.formulario))];
      
      const fSup = document.getElementById('filterSup');
      const fForm = document.getElementById('filterForm');
      
      sups.forEach(s => fSup.innerHTML += `<option value="${s}">${s}</option>`);
      forms.forEach(f => fForm.innerHTML += `<option value="${f}">${f}</option>`);
    }

    function processData() {
      const supF = document.getElementById('filterSup').value;
      const formF = document.getElementById('filterForm').value;
      const dateF = document.getElementById('dateFrom').value;
      const dateT = document.getElementById('dateTo').value;

      let filtered = RAW_DATA.filter(d => {
        let matchSup = supF === 'ALL' || d.supervisor === supF;
        let matchForm = formF === 'ALL' || d.formulario === formF;
        let matchDate = true;
        if(dateF) matchDate = matchDate && (d.fecha >= dateF);
        if(dateT) matchDate = matchDate && (d.fecha <= dateT);
        return matchSup && matchForm && matchDate;
      });

      updateKPIs(filtered);
      renderTable(filtered);
      drawCharts(filtered);
    }

    function updateKPIs(data) {
      document.getElementById('kpi-visitas').innerText = data.length;
      document.getElementById('kpi-forms').innerText = [...new Set(data.map(d => d.formulario))].length;
      document.getElementById('kpi-sups').innerText = [...new Set(data.map(d => d.supervisor))].length;
      document.getElementById('kpi-pdv').innerText = [...new Set(data.map(d => d.pdv))].length;
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = data.slice(0, 50).map(d => `
        <tr>
          <td>${d.fecha}</td>
          <td>${d.supervisor}</td>
          <td>${d.pdv}</td>
          <td>${d.formulario}</td>
        </tr>
      `).join('');
    }

    function drawCharts(data) {
      // 1. Barras: Supervisores
      let supCount = {};
      data.forEach(d => supCount[d.supervisor] = (supCount[d.supervisor] || 0) + 1);
      let barData = google.visualization.arrayToDataTable([
        ['Supervisor', 'Visitas', { role: 'style' }],
        ...Object.entries(supCount).map(([k, v]) => [k, v, '#004a99'])
      ]);
      new google.visualization.ColumnChart(document.getElementById('chart_bar')).draw(barData, { legend: 'none', chartArea: {width: '80%'} });

      // 2. Torta: Formularios
      let formCount = {};
      data.forEach(d => formCount[d.formulario] = (formCount[d.formulario] || 0) + 1);
      let pieData = google.visualization.arrayToDataTable([
        ['Formulario', 'Total'],
        ...Object.entries(formCount)
      ]);
      new google.visualization.PieChart(document.getElementById('chart_pie')).draw(pieData, { pieHole: 0.4, colors: ['#004a99', '#ffc107', '#2ecc71', '#e74c3c', '#9b59b6'] });

      // 3. Línea: Evolución
      let dateCount = {};
      data.forEach(d => dateCount[d.fecha] = (dateCount[d.fecha] || 0) + 1);
      let sortedDates = Object.entries(dateCount).sort((a,b) => a[0].localeCompare(b[0]));
      let lineData = google.visualization.arrayToDataTable([
        ['Fecha', 'Visitas'],
        ...sortedDates
      ]);
      new google.visualization.LineChart(document.getElementById('chart_line')).draw(lineData, { colors: ['#ffc107'], legend: {position: 'bottom'}, chartArea: {width: '85%'} });

      // 4. Barras: PDV
      let pdvCount = {};
      data.forEach(d => pdvCount[d.pdv] = (pdvCount[d.pdv] || 0) + 1);
      let topPDV = Object.entries(pdvCount).sort((a,b) => b[1]-a[1]).slice(0, 10);
      let pdvData = google.visualization.arrayToDataTable([['PDV', 'Visitas'], ...topPDV]);
      new google.visualization.BarChart(document.getElementById('chart_pdv')).draw(pdvData, { legend: 'none', colors: ['#2ecc71'] });
    }

    google.charts.setOnLoadCallback(loadData);
  </script>
</body>
</html>
