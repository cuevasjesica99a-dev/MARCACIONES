<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 200px; width: 100%; border-radius: 12px; margin-bottom: 1rem; }
    .select-custom { @apply w-full border-2 border-slate-200 p-3 rounded-xl focus:border-blue-500 outline-none transition-all bg-white; }
  </style>
</head>
<body class="bg-slate-100 p-4">
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6">
    <header class="text-center mb-6">
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">+MARKA</h1>
      <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Panel de Relevamiento</p>
    </header>

    <div id="map"></div>

    <form id="formMarcacion" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Nombre del Relevador</label>
        <select id="nombre" onchange="autoCompletarCedula()" class="select-custom border-2 border-slate-200 w-full p-3 rounded-xl">
          <option value="">Cargando personal...</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Cédula de Identidad</label>
        <input type="text" id="cedula" readonly class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl text-slate-500 font-mono" placeholder="ID automático">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Punto de Venta</label>
        <select id="pdv" onchange="enfocarPDV()" class="select-custom border-2 border-slate-200 w-full p-3 rounded-xl">
          <option value="">Cargando locales...</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4 mt-6">
        <button type="button" onclick="enviar('IN')" class="bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">CHECK-IN</button>
        <button type="button" onclick="enviar('OUT')" class="bg-rose-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">CHECK-OUT</button>
      </div>
    </form>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map, userMarker, pdvMarker;
    let userLat, userLng;
    let listaLocales = [];
    let listaEmpleados = [];

    window.onload = () => {
      map = L.map('map').setView([-25.30, -57.60], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      // Cargar TODO desde el Sheet
      google.script.run.withSuccessHandler(res => {
        // Llenar Empleados
        listaEmpleados = res.empleados;
        const selEmp = document.getElementById('nombre');
        selEmp.innerHTML = '<option value="">Seleccione su nombre...</option>';
        res.empleados.forEach((e, i) => {
          let opt = document.createElement('option');
          opt.value = i;
          opt.innerHTML = e.nombre;
          selEmp.appendChild(opt);
        });

        // Llenar Locales
        listaLocales = res.locales;
        const selPdv = document.getElementById('pdv');
        selPdv.innerHTML = '<option value="">Seleccione el local...</option>';
        res.locales.forEach((l, i) => {
          let opt = document.createElement('option');
          opt.value = i;
          opt.innerHTML = l.nombre;
          selPdv.appendChild(opt);
        });
      }).obtenerDatosBase();

      navigator.geolocation.watchPosition(pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        if (!userMarker) {
          userMarker = L.circleMarker([userLat, userLng], {color: '#3b82f6', radius: 8, fillOpacity: 0.8}).addTo(map);
        } else {
          userMarker.setLatLng([userLat, userLng]);
        }
      }, null, {enableHighAccuracy: true});
    };

    function autoCompletarCedula() {
      const idx = document.getElementById('nombre').value;
      if(idx !== "") document.getElementById('cedula').value = listaEmpleados[idx].cedula;
    }

    function enfocarPDV() {
      const idx = document.getElementById('pdv').value;
      if (idx === "") return;
      const local = listaLocales[idx];
      if (pdvMarker) map.removeLayer(pdvMarker);
      pdvMarker = L.marker([local.lat, local.lng]).addTo(map).bindPopup(local.nombre).openPopup();
      map.flyTo([local.lat, local.lng], 16);
    }

    function enviar(tipo) {
      const idxEmp = document.getElementById('nombre').value;
      const idxPdv = document.getElementById('pdv').value;
      
      if (!userLat || idxEmp === "" || idxPdv === "") {
        alert("Faltan datos o señal GPS.");
        return;
      }

      const ahora = new Date().toLocaleString();
      const datos = {
        timestamp: ahora,
        nombre: listaEmpleados[idxEmp].nombre,
        cedula: listaEmpleados[idxEmp].cedula,
        pdv: listaLocales[idxPdv].nombre,
        latActual: userLat,
        lngActual: userLng,
        validacion: "GPS OK",
        checkin: tipo === 'IN' ? ahora : "",
        checkout: tipo === 'OUT' ? ahora : ""
      };

      google.script.run.withSuccessHandler(() => {
        alert("¡Registro guardado!");
        if(tipo === 'OUT') location.reload();
      }).registrarMarcacion(datos);
    }
  </script>
</body>
</html>
