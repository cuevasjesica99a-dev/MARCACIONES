<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Arcor - GitHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .table-container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container table-container">
    <h2 class="mb-4">Reporte de Visitas (Desde Google Sheets)</h2>
    <div id="loader" class="loading">Cargando datos de supervisores...</div>
    
    <table class="table table-striped d-none" id="dashboardTable">
        <thead class="table-dark">
            <tr>
                <th>FECHA</th>
                <th>SUPERVISOR</th>
                <th>PUNTO DE VENTA</th>
                <th>FORMULARIO</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwM0vwK-4ZYhgGtSdppyslPg4axgTgfNizY-yGHMOthW03pRgMyud_0LwnsdjQOYSwAdA/exec";

    async function getData() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            renderTable(data);
        } catch (error) {
            document.getElementById('loader').innerHTML = "Error al conectar con la base de datos.";
            console.error(error);
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');
        const table = document.getElementById('dashboardTable');

        data.forEach(item => {
            // Formatear fecha si es necesario
            let fecha = item.FECHA;
            if(typeof fecha === 'string' && fecha.includes('T')) fecha = fecha.split('T')[0];

            let row = `<tr>
                <td>${fecha}</td>
                <td><strong>${item.SUPERVISOR}</strong></td>
                <td>${item["PUNTO DE VENTA"]}</td>
                <td><span class="badge bg-info text-dark">${item.FORMULARIO}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        loader.classList.add('d-none');
        table.classList.remove('d-none');
    }

    window.onload = getData;
</script>
</body>
</html>
