<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>+MARKA Check</title>

<style>
body { font-family: Arial; padding: 20px; }
input, select, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
}
button { background: #007bff; color: white; border: none; }
#status { font-weight: bold; }
</style>
</head>

<body>

<h2>+MARKA Check-In / Out</h2>

<input id="nombre" placeholder="Nombre">
<input id="cedula" placeholder="Cédula">

<select id="pdv"></select>

<p id="status">Cargando ubicación...</p>

<button onclick="checkIn()">CHECK-IN</button>
<button onclick="checkOut()">CHECK-OUT</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbwSgHk2AzbqNRKkrpCvsxZuQAMFpC4Ej7Z05dS44xXkB2vHxLLDbFqabYE6ccK8ZMTG/exec";

let userLat, userLng;
let pdvData = [];
let selectedPDV = null;

navigator.geolocation.getCurrentPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  document.getElementById("status").innerText = "Ubicación obtenida";
});

fetch(API + "?action=pdv")
.then(res => res.json())
.then(data => {
  pdvData = data;
  let select = document.getElementById("pdv");

  data.forEach(p => {
    let opt = document.createElement("option");
    opt.value = p.id;
    opt.text = p.nombre;
    select.add(opt);
  });

  select.onchange = () => {
    selectedPDV = pdvData.find(p => p.id == select.value);
  };
});

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
    Math.cos(φ1)*Math.cos(φ2) *
    Math.sin(Δλ/2)**2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function validarUbicacion() {
  if (!selectedPDV) return false;

  let dist = getDistance(userLat, userLng, selectedPDV.lat, selectedPDV.lng);

  if (dist <= 50) {
    document.getElementById("status").innerText = "✔ En PDV (" + Math.round(dist) + "m)";
    return dist;
  } else {
    document.getElementById("status").innerText = "❌ Fuera del PDV (" + Math.round(dist) + "m)";
    return false;
  }
}

function checkIn() {
  let dist = validarUbicacion();
  if (!dist) return alert("No estás en el PDV");

  let data = {
    nombre: nombre.value,
    cedula: cedula.value,
    pdv: selectedPDV.nombre,
    checkin: new Date().toLocaleTimeString(),
    checkout: "",
    lat: userLat,
    lng: userLng,
    distancia: dist
  };

  enviar(data);
}

function checkOut() {
  let data = {
    nombre: nombre.value,
    cedula: cedula.value,
    pdv: selectedPDV.nombre,
    checkin: "",
    checkout: new Date().toLocaleTimeString(),
    lat: userLat,
    lng: userLng,
    distancia: 0
  };

  enviar(data);
}

function enviar(data) {
  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => alert("Guardado correctamente"));
}
</script>

</body>
</html>
