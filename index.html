<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary-color: #0d6efd; }
    body { background-color: #f0f2f5; font-family: sans-serif; }
    .card-main { max-width: 450px; margin: 30px auto; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .header-box { background: var(--primary-color); color: white; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; }
    .hidden { display: none; }
    .btn-action { height: 65px; font-size: 1.1rem; font-weight: 700; border-radius: 10px; transition: 0.3s; }
    #statusOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; display: none; }
  </style>
</head>
<body>

<div id="statusOverlay">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-3 fw-bold" id="loaderText">Obteniendo ubicación...</p>
</div>

<div class="card card-main">
  <div class="header-box">
    <h4 class="mb-0">+MARKA - Control de Punto</h4>
  </div>
  
  <div class="card-body p-4">
    <div id="loginView">
      <div class="mb-4">
        <label class="form-label text-muted small fw-bold">NÚMERO DE CÉDULA</label>
        <input type="number" id="cedula" class="form-control form-control-lg" placeholder="Ingrese su ID">
      </div>
      <button onclick="intentarLogin()" class="btn btn-primary w-100 btn-action">INGRESAR</button>
    </div>

    <div id="panelView" class="hidden">
      <div class="alert alert-light border mb-4">
        <small class="text-muted">Bienvenido/a:</small><br>
        <strong id="labelNombre"></strong>
      </div>

      <div class="mb-4">
        <label class="form-label text-muted small fw-bold">SELECCIONAR LOCAL</label>
        <select id="pdvList" class="form-select form-select-lg"></select>
      </div>

      <div class="row g-2">
        <div class="col-6">
          <button onclick="ejecutarMarcacion('ENTRADA')" class="btn btn-success w-100 btn-action">ENTRADA</button>
        </div>
        <div class="col-6">
          <button onclick="ejecutarMarcacion('SALIDA')" class="btn btn-danger w-100 btn-action">SALIDA</button>
        </div>
      </div>
      
      <div id="resultBox" class="mt-4 p-3 rounded text-center hidden"></div>
    </div>
  </div>
</div>

<script>
  let DB_DATA = { pdvs: [], relevadores: [] };
  let USUARIO_ACTUAL = null;

  // Cargar datos al iniciar
  window.onload = function() {
    google.script.run
      .withSuccessHandler(data => { DB_DATA = data; })
      .withFailureHandler(err => alert("Error crítico: " + err.message))
      .getInitialData();
  };

  function intentarLogin() {
    const ced = document.getElementById('cedula').value.trim();
    const user = DB_DATA.relevadores.find(r => r.cedula === ced);
    
    if (user) {
      USUARIO_ACTUAL = user;
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('panelView').classList.remove('hidden');
      document.getElementById('labelNombre').innerText = user.nombre;
      llenarSelect();
    } else {
      alert("Cédula no registrada en el sistema.");
    }
  }

  function llenarSelect() {
    const select = document.getElementById('pdvList');
    DB_DATA.pdvs.forEach((p, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.text = p.nombre;
      select.add(opt);
    });
  }

  function ejecutarMarcacion(tipo) {
    const overlay = document.getElementById('statusOverlay');
    const resBox = document.getElementById('resultBox');
    
    resBox.classList.add('hidden');
    overlay.style.display = 'flex';

    if (!navigator.geolocation) {
      alert("Su teléfono no admite geolocalización.");
      overlay.style.display = 'none';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const pdvIndex = document.getElementById('pdvList').value;
        const pdv = DB_DATA.pdvs[pdvIndex];

        const payload = {
          tipo: tipo,
          cedula: USUARIO_ACTUAL.cedula,
          relevadorNombre: USUARIO_ACTUAL.nombre,
          pdvNombre: pdv.nombre,
          pdvLat: pdv.lat,
          pdvLng: pdv.lng,
          userLat: pos.coords.latitude,
          userLng: pos.coords.longitude
        };

        google.script.run
          .withSuccessHandler(res => {
            overlay.style.display = 'none';
            resBox.classList.remove('hidden');
            resBox.className = `mt-4 p-3 rounded text-center alert ${res.validacion === 'VALIDO' ? 'alert-success' : 'alert-warning'}`;
            resBox.innerHTML = `
              <strong>${tipo} REGISTRADA</strong><br>
              Distancia: ${res.distancia} metros<br>
              Estado: ${res.validacion}
            `;
          })
          .withFailureHandler(err => {
            overlay.style.display = 'none';
            alert("Error: " + err.message);
          })
          .registrarMarcacion(payload);
      },
      (err) => {
        overlay.style.display = 'none';
        alert("Error de GPS: Asegúrese de tener el GPS encendido y permitir el acceso a la ubicación.");
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }
</script>

</body>
</html>
