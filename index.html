<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard +Marka | Final</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; color: #333; }
    .header { background: #004a99; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .kpi-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid #ffc107; }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
    .chart-box { background: white; padding: 20px; border-radius: 12px; min-height: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    button { background: #ffc107; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div id="loader">
    <div style="border: 5px solid #f3f3f3; border-top: 5px solid #004a99; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p>Conectando con Google Sheets...</p>
</div>

<div class="container">
  <div class="header">
    <h2 style="margin:0">📊 Tablero de Gestión +Marka</h2>
    <button onclick="fetchData()">🔄 Actualizar</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">Total Visitas<h1 id="kVis">0</h1></div>
    <div class="kpi-card">Supervisores<h1 id="kSup">0</h1></div>
    <div class="kpi-card">Locales<h1 id="kPdv">0</h1></div>
  </div>

  <div class="charts-grid">
    <div class="chart-box"><div id="cBar" style="height: 350px;"></div></div>
    <div class="chart-box"><div id="cPie" style="height: 350px;"></div></div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz-lrFyoxXaSEpYanB4WYxOVYVGoDjuXzvDioPxucszg033nwkJH8d0e5_vDzca8vSfEQ/exec";

  google.charts.load('current', {'packages':['corechart']});

  async function fetchData() {
    document.getElementById('loader').style.display = 'flex';
    try {
      const resp = await fetch(API_URL);
      const rawData = await resp.json();
      
      if (!rawData || rawData.length === 0) {
          alert("El Sheet está vacío o no tiene el formato correcto.");
          return;
      }

      // Normalizar datos (convertir todo a mayúsculas para evitar errores)
      const data = rawData.map(d => {
          let obj = {};
          for (let key in d) {
              obj[key.toUpperCase().trim()] = d[key];
          }
          return obj;
      });

      // Actualizar indicadores
      document.getElementById('kVis').innerText = data.length;
      document.getElementById('kSup').innerText = [...new Set(data.map(d => d.SUPERVISOR || d.supervisor))].length;
      document.getElementById('kPdv').innerText = [...new Set(data.map(d => d["PUNTO DE VENTA"] || d.pdv))].length;

      drawCharts(data);
    } catch (e) {
      console.error(e);
      alert("Error al cargar datos. Revisa la consola.");
    } finally {
      document.getElementById('loader').style.display = 'none';
    }
  }

  function drawCharts(data) {
    // Gráfico Supervisores
    let sMap = {}; data.forEach(d => { let s = d.SUPERVISOR || "N/A"; sMap[s] = (sMap[s] || 0) + 1; });
    let dBar = google.visualization.arrayToDataTable([['Supervisor', 'Visitas'], ...Object.entries(sMap)]);
    new google.visualization.ColumnChart(document.getElementById('cBar')).draw(dBar, {title: 'Visitas por Supervisor', colors:['#004a99'], chartArea:{width:'70%', height:'70%'} });

    // Gráfico Formularios
    let fMap = {}; data.forEach(d => { let f = d.FORMULARIO || "N/A"; fMap[f] = (fMap[f] || 0) + 1; });
    let dPie = google.visualization.arrayToDataTable([['Form', 'Cant'], ...Object.entries(fMap)]);
    new google.visualization.PieChart(document.getElementById('cPie')).draw(dPie, {title: 'Uso de Formularios', pieHole: 0.4});
  }

  const style = document.createElement('style');
  style.innerHTML = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
  document.head.appendChild(style);

  google.charts.setOnLoadCallback(fetchData);
</script>
</body>
</html>
